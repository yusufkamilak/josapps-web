<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - Wezu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 2rem;
            background-color: #f9f9f9;
        }
        nav {
            text-align: center;
            margin: 2rem 0;
        }
        nav a {
            margin: 0 1rem;
            text-decoration: none;
            color: #4CAF50;
            font-size: 1.2rem;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1, h2 {
            color: #333;
        }
        p {
            line-height: 1.6;
            color: #555;
        }
        .email-button {
            display: inline-block;
            margin: 1.5rem 0 0.5rem;
            padding: 0.8rem 1.6rem;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 1.1rem;
        }
        .email-button:hover {
            background-color: #43a047;
        }
        .email-text {
            color: #4CAF50;
            font-weight: bold;
        }
        /* Media Query for mobile responsiveness */
        @media (max-width: 768px) {
            nav a {
                font-size: 1rem;
                margin: 0 0.5rem;
            }
            main {
                padding: 1.5rem;
                margin: 1rem;
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            nav a {
                font-size: 0.9rem;
                margin: 0 0.3rem;
            }
            main {
                padding: 1rem;
                margin: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>Wezu Support</h1>
        <p>Need help, found a bug, or have a suggestion? We're happy to hear from you.</p>
        <p>Send us an email and we'll get back to you as soon as we can.</p>

        <a class="email-button" href="mailto:ak.yusufkamil@gmail.com?subject=Wezu%20Support">Email Support</a>
        <p>or write to us directly at<br><span class="email-text">ak.yusufkamil@gmail.com</span></p>

        <nav>
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="terms-conditions.html">Terms and Conditions</a>
        </nav>
    </main>
</body>
</html>
